server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # health for EB/ALB
  location = /health {
    default_type text/plain;
    return 200 'ok';
  }

  # cache static assets
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # OPTIONAL (only if you want the FE to proxy /api in production too)
  # Replace BACKEND_URL with your API URL (ALB or EB CNAME)
  location /api/ {
    proxy_pass http://http://demy-data-api-env.eba-vuu6stvy.eu-west-2.elasticbeanstalk.com/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }
}